<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Pre-Order</title>
	<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 700px;
            width: 100%;
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 28px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .info-box {
            background: linear-gradient(135deg, #667eea15, #764ba215);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-left: 4px solid #667eea;
        }
        .info-box div { margin-bottom: 8px; }
        .info-box strong { color: #667eea; margin-right: 10px; }
        .form-group { margin-bottom: 24px; }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        label .required { color: #e74c3c; }
        input, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
            font-family: inherit;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-left: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .message {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }
        .input-hint {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        #priceGroup { display: none; }
        @media (max-width: 600px) {
            .row { grid-template-columns: 1fr; }
            .container { padding: 24px; }
        }
        /* Select2 стили */
        /* Минимальные стили для Select2 */
        .select2-container {
            width: 100% !important;
        }
        .select2-container--default .select2-selection--single {
            min-height: 48px !important;
            border: 2px solid #e0e0e0 !important;
            border-radius: 8px !important;
        }
        .select2-container--default.select2-container--focus .select2-selection--single {
            border-color: #667eea !important;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Create New Pre-Order</h1>
        <p class="subtitle">Fill in the details below to create a new trading order</p>
        
        <div class="info-box">
            <div><strong>Consultant:</strong> <span id="consultantInfo">Loading...</span></div>
            <div><strong>Client:</strong> <span id="clientInfo">Loading...</span></div>
        </div>

        <form id="orderForm">
            <!-- Переключатель типа инструмента -->
            <div class="form-group">
                <label>Instrument Type <span class="required">*</span></label>
                <div style="display: flex; gap: 20px; margin-top: 10px;">
                    <label style="display: flex; align-items: center; cursor: pointer;">
                        <input type="radio" name="instrumentType" value="security" checked 
                               style="width: auto; margin-right: 8px;">
                        <span>🏦 Security (Stock/Bond)</span>
                    </label>
                    <label style="display: flex; align-items: center; cursor: pointer;">
                        <input type="radio" name="instrumentType" value="currency" 
                               style="width: auto; margin-right: 8px;">
                        <span>💱 Currency Conversion</span>
                    </label>
                </div>
            </div>

            <!-- Для Security: ISIN + Currency -->
            <div id="securityFields">
                <div class="form-group">
                    <label for="isinSelect">ISIN <span class="required">*</span></label>
                    <select id="isinSelect" required style="width: 100%;">
                        <option value="">Search and select ISIN...</option>
                    </select>
                    <div class="input-hint">Search by ISIN code</div>
                </div>

                <div class="form-group">
                    <label for="currencySelect">Operation Currency <span class="required">*</span></label>
                    <select id="currencySelect" required>
                        <option value="">Select currency...</option>
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                        <option value="GBP">GBP</option>
                        <option value="AED">AED</option>
                        <option value="CHF">CHF</option>
                        <option value="HKD">HKD</option>
                        <option value="CAD">CAD</option>
                    </select>
                    <div class="input-hint">Currency for this operation</div>
                </div>
            </div>

            <!-- Для Currency: валютная пара -->
            <div id="currencyFields" style="display: none;">
                <div class="form-group">
                    <label for="currencyPairSelect">Currency Pair <span class="required">*</span></label>
                    <select id="currencyPairSelect" style="width: 100%;">
                        <option value="">Select currency pair...</option>
                    </select>
                    <div class="input-hint">Select conversion pair</div>
                </div>
            </div>

            <!-- Общие поля -->
            <div class="row">
                <div class="form-group">
                    <label for="orderType">Order Type <span class="required">*</span></label>
                    <select id="orderType" required>
                        <option value="">Select...</option>
                        <option value="Buy">🟢 Buy</option>
                        <option value="Sell">🔴 Sell</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="executionType">Execution Type <span class="required">*</span></label>
                    <select id="executionType" required>
                        <option value="">Select...</option>
                        <option value="Market">📈 Market</option>
                        <option value="Limit">🎯 Limit</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="quantity">Quantity <span class="required">*</span></label>
                    <input type="number" id="quantity" required min="0.0001" step="0.0001" placeholder="10.5">
                    <div class="input-hint">Can be fractional</div>
                </div>

                <div class="form-group" id="priceGroup">
                    <label for="price">Price per Share <span class="required">*</span></label>
                    <input type="number" id="price" min="0.01" step="0.01" placeholder="150.00">
                    <div class="input-hint">USD</div>
                </div>
            </div>

            <div class="form-group">
                <label for="comment">Comment / Notes</label>
                <input type="text" id="comment" placeholder="Optional" maxlength="500">
            </div>

            <button type="submit" id="submitBtn">Create Pre-Order</button>
        </form>

        <div id="message" class="message"></div>
    </div>

    <script>
        let API_URL = '';
        let API_KEY = '';

        // Загружаем конфиг с сервера
        async function loadConfig() {
            try {
                const response = await fetch('https://amwealth-preorders-api-ana9f3gkajd2bsga.uaenorth-01.azurewebsites.net/api/config');
                const config = await response.json();
                API_URL = config.apiUrl;
                API_KEY = config.apiKey;
            } catch (error) {
                console.error('Failed to load config:', error);
            }
        }

        // Загружаем конфиг при загрузке страницы
        loadConfig();

        // Параметры из URL
        const urlParams = new URLSearchParams(window.location.search);
        const consultantId = urlParams.get('consultantId') || '';
        const consultantName = urlParams.get('consultantName') || 'Not specified';
        const clientId = urlParams.get('clientId') || '';
        const clientName = urlParams.get('clientName') || 'Not specified';

        document.getElementById('consultantInfo').textContent = consultantName;
        document.getElementById('clientInfo').textContent = clientName;

        // Инициализация Select2 с динамическим поиском для ISIN
        function initISINSelect() {
            $('#isinSelect').select2({
                placeholder: 'Type to search ISIN (min 2 chars)...',
                allowClear: true,
                width: '100%',
                minimumInputLength: 2,
                ajax: {
                    url: 'https://amwealth-preorders-api-ana9f3gkajd2bsga.uaenorth-01.azurewebsites.net/api/instruments/securities',
                    delay: 300,
                    data: function (params) {
                        return {
                            search: params.term
                        };
                    },
                    processResults: function (data) {
                        if (data.success) {
                            return {
                                results: data.securities.map(sec => ({
                                    id: sec.isin,
                                    text: sec.display
                                }))
                            };
                        }
                        return { results: [] };
                    },
                    cache: true
                }
            });
        }

        // Загрузка валютных пар
        async function loadCurrencyPairs() {
            try {
                const response = await fetch('https://amwealth-preorders-api-ana9f3gkajd2bsga.uaenorth-01.azurewebsites.net/api/instruments/currencies');
                const data = await response.json();
                if (data.success) {
                    const select = $('#currencyPairSelect');
                    select.empty();
                    select.append('<option value="">Select currency pair...</option>');
                    
                    data.currencies.forEach(curr => {
                        select.append(new Option(curr.display, curr.symbol));
                    });
                    
                    select.select2({
                        placeholder: 'Select currency pair...',
                        allowClear: true,
                        width: '100%'
                    });
                }
            } catch (error) {
                console.error('Failed to load currency pairs:', error);
            }
        }

        // Инициализация после загрузки DOM
        $(document).ready(function() {
            // Инициализируем Select2 dropdowns
            initISINSelect();
            loadCurrencyPairs();
            
            // Переключение между Security и Currency
            document.querySelectorAll('input[name="instrumentType"]').forEach(radio => {
                radio.addEventListener('change', function() {
                    const securityFields = document.getElementById('securityFields');
                    const currencyFields = document.getElementById('currencyFields');
                    const isinSelect = document.getElementById('isinSelect');
                    const currencySelect = document.getElementById('currencySelect');
                    const currencyPairSelect = document.getElementById('currencyPairSelect');
                    
                    if (this.value === 'security') {
                        securityFields.style.display = 'block';
                        currencyFields.style.display = 'none';
                        isinSelect.required = true;
                        currencySelect.required = true;
                        currencyPairSelect.required = false;
                    } else {
                        securityFields.style.display = 'none';
                        currencyFields.style.display = 'block';
                        isinSelect.required = false;
                        currencySelect.required = false;
                        currencyPairSelect.required = true;
                    }
                });
            });

            // Показать/скрыть поле Price в зависимости от Execution Type
            document.getElementById('executionType').addEventListener('change', function() {
                const priceGroup = document.getElementById('priceGroup');
                const priceInput = document.getElementById('price');
                
                if (this.value === 'Limit') {
                    priceGroup.style.display = 'block';
                    priceInput.required = true;
                } else {
                    priceGroup.style.display = 'none';
                    priceInput.required = false;
                    priceInput.value = '';
                }
            });

            // Обработка отправки формы
            document.getElementById('orderForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                // Убедимся что конфиг загружен
                if (!API_URL || !API_KEY) {
                    await loadConfig();
                }
                
                const submitBtn = document.getElementById('submitBtn');
                const messageDiv = document.getElementById('message');
                
                if (!consultantId || !clientId) {
                    showMessage('error', 'Missing required parameters from Power BI');
                    return;
                }
                
                submitBtn.disabled = true;
                submitBtn.innerHTML = 'Creating Order... <span class="loader"></span>';
                
                // Определяем тип инструмента и получаем ISIN
                const instrumentType = document.querySelector('input[name="instrumentType"]:checked').value;
                let isinValue = '';
                
                if (instrumentType === 'security') {
                    isinValue = document.getElementById('isinSelect').value;
                    if (!isinValue) {
                        showMessage('error', 'Please select an ISIN');
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Create Pre-Order';
                        return;
                    }
                } else {
                    isinValue = document.getElementById('currencyPairSelect').value;
                    if (!isinValue) {
                        showMessage('error', 'Please select a currency pair');
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Create Pre-Order';
                        return;
                    }
                }
                
                const orderData = {
                    consultant_id: consultantId,
                    consultant_name: consultantName,
                    client_id: clientId,
                    client_name: clientName,
                    isin: isinValue,
                    order_type: document.getElementById('orderType').value,
                    execution_type: document.getElementById('executionType').value,
                    quantity: parseFloat(document.getElementById('quantity').value),
                    price: document.getElementById('price').value ? parseFloat(document.getElementById('price').value) : null,
                    comment: document.getElementById('comment').value || null,
                    created_by: consultantName
                };
                
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-functions-key': API_KEY
                        },
                        body: JSON.stringify(orderData)
                    });
                    
                    const result = await response.json();
                    
                    if (response.ok && result.success) {
                        showMessage('success',
                            `✓ Pre-Order #${result.order_id} created successfully!`
                        );
                        
                        // Сброс формы
                        document.getElementById('orderForm').reset();
                        $('#isinSelect').val(null).trigger('change');
                        $('#currencyPairSelect').val(null).trigger('change');
                        document.getElementById('priceGroup').style.display = 'none';
                        
                        setTimeout(() => window.close(), 3000);
                    } else {
                        throw new Error(result.error || 'Unknown error');
                    }
                    
                } catch (error) {
                    showMessage('error', `❌ Error: ${error.message}`);
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create Pre-Order';
                }
            });
        });
        
        function showMessage(type, html) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = 'message ' + type;
            messageDiv.innerHTML = html;
            messageDiv.style.display = 'block';
        }
    </script>
</body>
</html>
